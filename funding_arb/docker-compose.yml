services:
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:latest
    container_name: ib_gateway_paper
    restart: always # 如果崩溃了自动重启
    environment:
      - TWS_USERID=${IB_USER}
      - TWS_PASSWORD=${IB_PASSWORD}
      - TRADING_MODE=${TRADING_MODE}
      - READ_ONLY_API=no # 允许 IBKR paper API 下单；联调实盘前仍由脚本 dry_run 控制
      - TWS_ACCEPT_INCOMING=accept # IBC 当前模板使用的 API 连接确认变量
      - BYPASS_WARNING=yes # paper 联调时自动跳过 API 风险确认弹窗
      - ALLOW_BLIND_TRADING=yes # 无实时行情权限时允许 paper 盲下单确认
      - TWOFA_TIMEOUT_ACTION=exit # 对于纸盘，不需要双重认证
      - EXISTING_SESSION_DETECTED_ACTION=primary
      - EXISTINGSESSIONDETECTEDACTION=primary # 自动接管已有会话
      - ACCEPTINCOMINGCONNECTIONACTION=accept # 自动接受所有 API 连接请求
    ports:
      - "127.0.0.1:4004:4004" # socat 转发端口（外部唯一可用的 API 入口）
    volumes:
      - ./ib_config:/root/Jts # 将配置挂载到本地，防止重启后配置丢失
